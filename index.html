<!DOCTYPE html>
<html>
<head>
  <title>Fiona Tan Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* premium animated background */
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #111827);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* glass card */
    .box {
      width: 320px;
      padding: 40px;
      border-radius: 16px;
      text-align: center;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);

      color: white;
    }

    .box h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .box p {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.8;
    }

    /* input {
      width: 100%;
      padding: 12px;
      margin-top: 20px;

      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      outline: none;

      background: rgba(255,255,255,0.1);
      color: white;
    } */

    input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    input:focus {
      border: 1px solid #38bdf8;
      box-shadow: 0 0 10px rgba(56,189,248,0.4);
    }

    /* button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;

      border: none;
      border-radius: 10px;

      background: white;
      color: #111827;
      font-weight: bold;
      cursor: pointer;

      transition: 0.2s;
    } */

    /* button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    } */

    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
    }

    /* INPUT */
    input {
      padding: 12px;
      margin-top: 20px;

      border: 1px solid rgba(255,255,255,0.2);
      outline: none;

      background: rgba(255,255,255,0.1);
      color: white;
    }

    /* BUTTON */
    button {
      margin-top: 12px;
      padding: 12px;

      border: none;
      background: white;
      color: #111827;
      font-weight: bold;
      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }

    #error {
      margin-top: 10px;
      font-size: 12px;
      color: #f87171;
      height: 16px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>FIONA TAN</h2>
  <p>IT Operations & System Specialist</p>

  <input type="password" id="passcode" placeholder="Enter password">

  <button onclick="checkPass()">Enter Portfolio</button>

  <p id="error"></p>
</div>

<script>
function checkPass() {
  const input = document.getElementById("passcode").value;
  const correctPassword = "FIONATAN";

  if (input === correctPassword) {
    window.location.href = "portfolio.html";
  } else {
    document.getElementById("error").innerText = "Incorrect password. Try again.";
  }
}
</script>

</body>
</html>
