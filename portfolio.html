<!DOCTYPE html>
<html>
<head>
  <title>Fiona Tan Portfolio</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
      padding: 40px;
    }

    .project {
      background: #f3f3f3;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      cursor: pointer;
    }

    .details {
      display: none;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Fiona Tan Portfolio</h1>

<div class="project" onclick="toggle(this)">
  <h3>Onboarding Automation Workflow</h3>

  <div class="details">
    <p>Built automation system for HR onboarding processes.</p>
    <p>Tools: Low-code platform, workflow automation</p>
  </div>
</div>

<div class="project" onclick="toggle(this)">
  <h3>IT Ticketing Optimization</h3>

  <div class="details">
    <p>Improved internal IT support workflow efficiency.</p>
  </div>
</div>

<p><a href="index.html">Logout</a></p>

<!-- ✅ JavaScript goes here -->
<script>
function toggle(el) {
  const details = el.querySelector(".details");

  if (details.style.display === "block") {
    details.style.display = "none";
  } else {
    details.style.display = "block";
  }
}
</script>

</body>
</html>
