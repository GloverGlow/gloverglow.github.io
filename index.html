<!DOCTYPE html>
<html>
<head>
  <title>Fiona Tan Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;

      /* animated background */
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #0ea5e9, #111827);
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* fade-in animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* glass card */
    .box {
      width: 320px;
      padding: 40px;
      border-radius: 16px;
      text-align: center;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);

      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);

      color: white;

      /* apply fade-in */
      animation: fadeInUp 0.9s ease-out;
    }

    .box h2 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 1px;
    }

    .box p {
      margin-top: 8px;
      font-size: 13px;
      opacity: 0.8;
    }

    /* button */
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;

      border: none;
      border-radius: 10px;

      background: white;
      color: #111827;
      font-weight: bold;
      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.25);
    }
  </style>
</head>

<body>

<div class="box">
  <h2>FIONA TAN</h2>
  <p>IT Operations & System Specialist</p>

  <button onclick="goToPortfolio()">Enter Portfolio</button>
</div>

<script>
function goToPortfolio() {
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "portfolio.html";
  }, 500);
}
</script> 

</body>
</html>
