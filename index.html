<!DOCTYPE html>
<html>
<head>
  <title>Fiona Tan Portfolio</title>
  <style>
    body {
      font-family: Arial;
      height: 100vh;
      display: flex;
      justify-content: center;  /* horizontal center */
      align-items: center;      /* vertical center */
      margin: 0;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Enter Access Code</h2>

  <input type="password" id="passcode" placeholder="Enter code">

  <button onclick="checkPass()">Enter</button>

  <p id="error"></p>
</div>

<script>
function checkPass() {
  const input = document.getElementById("passcode").value;

  const correctPassword = "FIONATAN";

  if (input === correctPassword) {
    window.location.href = "portfolio.html";
  } else {
    document.getElementById("error").innerText = "Incorrect code";
  }
}
</script>

</body>
</html>
